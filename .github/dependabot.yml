# Dependabot — surveillance des deps npm sur frontend + backend.
#
# Objectif : garder les deps à jour SANS noyer le repo sous les PR.
# Deux leviers anti-bruit :
#   1. Cadence mensuelle. Les updates de SÉCURITÉ restent immédiates :
#      Dependabot ouvre une PR dès qu'une advisory tombe, hors planning.
#   2. Groupage agressif : chaque famille de lib = 1 PR, et un groupe
#      catch-all "misc" (patterns "*") ramasse tout le reste (stripe,
#      tailwind, zod, pino…) en 1 seule PR par écosystème, au lieu
#      d'1 PR isolée par lib.
#
# Règle Dependabot : une dep tombe dans le PREMIER groupe qui matche,
# donc "misc: *" DOIT rester EN DERNIER pour ne pas avaler les groupes nommés.
# "misc" est limité à minor/patch : un bump MAJOR d'une lib non groupée
# (ex : Stripe 22→23) reste une PR isolée, à reviewer avec soin.
#
# Doc : https://docs.github.com/en/code-security/dependabot

version: 2

updates:
  # ─────────────── Frontend ───────────────
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      next:
        patterns:
          - "next"
          - "@next/*"
          - "eslint-config-next"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
      tooling:
        patterns:
          - "eslint*"
          - "prettier*"
      # Catch-all : tailwindcss, tailwind-merge, @phosphor-icons, etc.
      # → une seule PR groupée. DOIT rester en dernier.
      misc:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # ─────────────── Backend ────────────────
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
      express:
        patterns:
          - "express"
          - "@types/express"
          - "cookie-parser"
          - "@types/cookie-parser"
          - "cors"
          - "@types/cors"
          - "helmet"
          - "@types/helmet"
      tooling:
        patterns:
          - "tsx"
          - "prettier*"
          - "ts-node"
      # Catch-all : stripe, zod, pino, resend, node-cron, etc.
      # → une seule PR groupée. DOIT rester en dernier.
      misc:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # ─────────────── GitHub Actions ─────────
  # Bump nos workflows GitHub Actions quand ils existeront.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
